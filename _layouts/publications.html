---
layout: default
---

<article class="publication">
  <h1>{{ page.title }}</h1>
  <p><strong>作者：</strong>{{ page.authors }}</p>
  <p><strong>发表于：</strong>{{ page.journal }} ({{ page.year }})</p>
  <p><strong>摘要：</strong>{{ content }}</p>
  
  {% if page.pdf %}
    <p><a href="{{ page.pdf }}" target="_blank">下载 PDF</a></p>
  {% endif %}
</article>
